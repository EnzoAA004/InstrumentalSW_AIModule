name: SAX-035 RED

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  red:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run SAX-035 RED
        shell: bash
        run: |
          set +e
          python -m pytest \
            tests/unit/test_score_render_contracts.py \
            tests/unit/test_score_rendering.py \
            tests/integration/test_verovio_svg_rendering.py \
            2>&1 | tee sax035-red.txt
          status=${PIPESTATUS[0]}
          echo "RED_EXIT_CODE=${status}" | tee -a sax035-red.txt
          test "${status}" -ne 0
      - name: Upload RED evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sax035-red-evidence
          path: sax035-red.txt
          if-no-files-found: error
          retention-days: 1
