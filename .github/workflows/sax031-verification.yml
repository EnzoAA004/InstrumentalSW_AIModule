name: SAX-031 Command Verification

"on":
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Python 3.13 requested command matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run requested commands
        continue-on-error: true
        shell: bash
        run: |
          set +e
          run_control() {
            name="$1"
            shift
            "$@" > "${name}.log" 2>&1
            code=$?
            printf '%s\n' "$code" > "${name}.exit"
          }

          run_control check-quality python scripts/check_quality.py
          run_control pytest-all python -m pytest
          run_control pytest-not-integration python -m pytest -m "not integration"
          run_control pytest-integration python -m pytest -m integration
          run_control pytest-midi-integration python -m pytest -m midi_integration
          run_control pytest-baseline-integration python -m pytest -m baseline_integration
          run_control pytest-coverage python -m pytest --cov=saxo_ai --cov-report=term-missing --cov-report=xml
          run_control ruff-lint python -m ruff check src tests scripts
          run_control ruff-format python -m ruff format --check src tests scripts
          run_control mypy python -m mypy

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sax031-command-verification
          path: |
            *.log
            *.exit
          if-no-files-found: error
          retention-days: 1

      - name: Propagate first failing command
        if: always()
        shell: bash
        run: |
          for control in \
            check-quality \
            pytest-all \
            pytest-not-integration \
            pytest-integration \
            pytest-midi-integration \
            pytest-baseline-integration \
            pytest-coverage \
            ruff-lint \
            ruff-format \
            mypy; do
            code=$(cat "${control}.exit")
            if [ "$code" -ne 0 ]; then
              echo "::error::${control} failed with exit code ${code}"
              exit "$code"
            fi
          done
