name: SAX-034 Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run diagnostics
        shell: bash
        run: |
          set +e
          : > sax034-diagnostics.txt
          run_command() {
            echo "" | tee -a sax034-diagnostics.txt
            echo "$ $*" | tee -a sax034-diagnostics.txt
            "$@" 2>&1 | tee -a sax034-diagnostics.txt
            status=${PIPESTATUS[0]}
            echo "EXIT_CODE=${status}" | tee -a sax034-diagnostics.txt
          }
          run_command python -m pytest \
            tests/unit/test_musicxml_contracts.py \
            tests/unit/test_musicxml_pitch.py \
            tests/unit/test_musicxml_measures.py \
            tests/unit/test_musicxml_export.py \
            tests/integration/test_musicxml_verovio.py
          run_command python -m ruff check src tests scripts
          run_command python -m ruff format --check src tests scripts
          run_command python -m mypy
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sax034-diagnostics
          path: sax034-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
