name: SAX-034 Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Apply focused corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          application = Path("src/saxo_ai/application/musicxml_export.py")
          text = application.read_text()
          text = text.replace(
              "zip(original.timeline, segment_counts)",
              "zip(original.timeline, segment_counts, strict=True)",
          )
          application.write_text(text)

          integration = Path("tests/integration/test_musicxml_verovio.py")
          text = integration.read_text()
          text = text.replace("import verovio  # type: ignore[import-untyped]", "import verovio")
          text = text.replace(
              "pytestmark = (pytest.mark.integration, pytest.mark.musicxml_integration)",
              "pytestmark = [pytest.mark.integration, pytest.mark.musicxml_integration]",
          )
          integration.write_text(text)

          reader = Path("src/saxo_ai/infrastructure/verovio_musicxml.py")
          text = reader.read_text()
          text = text.replace("import verovio  # type: ignore[import-untyped]", "import verovio")
          text = text.replace(
              "    verovio.enableLogToBuffer(True)\n",
              "    enable_log_to_buffer = getattr(verovio, \"enableLogToBuffer\", None)\n"
              "    if callable(enable_log_to_buffer):\n"
              "        enable_log_to_buffer(True)\n",
          )
          reader.write_text(text)

          encoder = Path("src/saxo_ai/infrastructure/musicxml_encoder.py")
          text = encoder.read_text()
          text = text.replace(
              "from xml.etree import ElementTree as ET\n",
              "from typing import cast\nfrom xml.etree import ElementTree as ET\n",
          )
          text = text.replace(
              "        return ET.tostring(\n",
              "        return cast(\n            bytes,\n            ET.tostring(\n",
          )
          text = text.replace(
              "            short_empty_elements=True,\n        )\n",
              "                short_empty_elements=True,\n            ),\n        )\n",
          )
          encoder.write_text(text)

          export_test = Path("tests/unit/test_musicxml_export.py")
          text = export_test.read_text()
          text = text.replace(
              "    MusicXmlExportSettings,\n",
              "    MusicXmlExportResult,\n    MusicXmlExportSettings,\n",
          )
          text = text.replace(
              "def export(original: QuantizedRhythmResult | None = None):",
              "def export(\n    original: QuantizedRhythmResult | None = None,\n) -> MusicXmlExportResult:",
          )
          export_test.write_text(text)
          PY
          python -m ruff format \
            src/saxo_ai/domain/musicxml_export.py \
            src/saxo_ai/application/musicxml_export.py \
            src/saxo_ai/infrastructure/musicxml_encoder.py \
            src/saxo_ai/infrastructure/verovio_musicxml.py \
            tests/musicxml_helpers.py \
            tests/unit/test_musicxml_contracts.py \
            tests/unit/test_musicxml_pitch.py \
            tests/unit/test_musicxml_measures.py \
            tests/unit/test_musicxml_export.py \
            tests/integration/test_musicxml_verovio.py
          python -m ruff check --fix \
            src/saxo_ai/domain/musicxml_export.py \
            src/saxo_ai/application/musicxml_export.py \
            src/saxo_ai/infrastructure/musicxml_encoder.py \
            src/saxo_ai/infrastructure/verovio_musicxml.py \
            tests/musicxml_helpers.py \
            tests/unit/test_musicxml_contracts.py \
            tests/unit/test_musicxml_pitch.py \
            tests/unit/test_musicxml_measures.py \
            tests/unit/test_musicxml_export.py \
            tests/integration/test_musicxml_verovio.py
          if git diff --quiet; then
            echo "No corrections required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "refactor(SAX-034): apply canonical typing and formatting"
          git push origin HEAD:${{ github.head_ref }}
      - name: Run focused controls
        shell: bash
        run: |
          python -m pytest \
            tests/unit/test_musicxml_contracts.py \
            tests/unit/test_musicxml_pitch.py \
            tests/unit/test_musicxml_measures.py \
            tests/unit/test_musicxml_export.py \
            tests/integration/test_musicxml_verovio.py
          python -m ruff check src tests scripts
          python -m ruff format --check src tests scripts
          python -m mypy
