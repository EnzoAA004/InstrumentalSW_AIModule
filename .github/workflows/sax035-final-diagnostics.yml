name: SAX-035 Final Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run diagnostics
        shell: bash
        run: |
          set +e
          : > sax035-final-diagnostics.txt
          python - <<'PY' 2>&1 | tee -a sax035-final-diagnostics.txt
          import importlib
          import verovio

          print("VEROVIO_MODULE", verovio.__file__)
          print("VEROVIO_LOG_NAMES", sorted(name for name in dir(verovio) if "log" in name.lower()))
          print("VEROVIO_INTERNAL_NAMES", sorted(name for name in dir(verovio) if name.startswith("_")))
          for module_name in ("verovio._verovio", "_verovio"):
              try:
                  module = importlib.import_module(module_name)
              except Exception as error:
                  print("IMPORT", module_name, type(error).__name__, str(error))
              else:
                  print(
                      "MODULE",
                      module_name,
                      sorted(name for name in dir(module) if "log" in name.lower()),
                  )
          toolkit = verovio.toolkit()
          print("TOOLKIT_LOG_NAMES", sorted(name for name in dir(toolkit) if "log" in name.lower()))
          PY
          echo "INTROSPECTION_EXIT_CODE=${PIPESTATUS[0]}" | tee -a sax035-final-diagnostics.txt
          run_command() {
            echo "" | tee -a sax035-final-diagnostics.txt
            echo "$ $*" | tee -a sax035-final-diagnostics.txt
            "$@" 2>&1 | tee -a sax035-final-diagnostics.txt
            status=${PIPESTATUS[0]}
            echo "EXIT_CODE=${status}" | tee -a sax035-final-diagnostics.txt
          }
          run_command python -m pytest \
            tests/unit/test_score_render_contracts.py \
            tests/unit/test_score_rendering.py \
            tests/unit/test_verovio_svg_adapter.py \
            tests/integration/test_verovio_svg_rendering.py
          run_command python -m ruff check src tests scripts
          run_command python -m ruff format --check src tests scripts
          run_command python -m mypy
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sax035-final-diagnostics
          path: sax035-final-diagnostics.txt
          if-no-files-found: error
          retention-days: 1
