name: SAX-043 Last Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Remove duplicate imports and helpers
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"{path}: expected one occurrence of {old!r}, found {text.count(old)}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "tests/api/test_transcription_revisions.py",
              "from collections.abc import Callable\nfrom collections.abc import Callable\n",
              "from collections.abc import Callable\n",
          )
          replace_once(
              "tests/unit/test_transcription_revisions.py",
              "from saxo_ai.domain.written_pitch import WrittenPitchTranscriptionResult\n"
              "from saxo_ai.domain.written_pitch import WrittenPitchTranscriptionResult\n",
              "from saxo_ai.domain.written_pitch import WrittenPitchTranscriptionResult\n",
          )
          replace_once(
              "tests/unit/test_transcription_revisions.py",
              "    InMemoryTranscriptionReviewRegistrationRepository,\n"
              "    InMemoryTranscriptionReviewRegistrationRepository,\n",
              "    InMemoryTranscriptionReviewRegistrationRepository,\n",
          )
          replace_once(
              "tests/unit/test_transcription_revisions.py",
              "        setattr(revision, \"revision_number\", 5)",
              "        revision.__setattr__(\"revision_number\", 5)",
          )
          replace_once(
              "tests/unit/test_transcription_revisions.py",
              "        setattr(revision, \"events\", ())",
              "        revision.__setattr__(\"events\", ())",
          )

          helper = (
              "def registration_repository(\n"
              "    reviews: InMemoryTranscriptionReviewRepository,\n"
              ") -> InMemoryTranscriptionReviewRegistrationRepository:\n"
              "    return InMemoryTranscriptionReviewRegistrationRepository(\n"
              "        reviews, InMemoryTranscriptionRevisionRepository()\n"
              "    )\n\n\n"
          )
          target = Path("tests/unit/test_transcription_review.py")
          text = target.read_text(encoding="utf-8")
          if text.count(helper) != 2:
              raise RuntimeError(f"expected duplicate helper twice, found {text.count(helper)}")
          first = text.find(helper)
          second = text.find(helper, first + len(helper))
          target.write_text(text[:second] + text[second + len(helper):], encoding="utf-8")
          PY
          python -m ruff format tests/api/test_transcription_revisions.py tests/unit/test_transcription_review.py tests/unit/test_transcription_revisions.py
          python -m ruff check tests/api/test_transcription_revisions.py tests/unit/test_transcription_review.py tests/unit/test_transcription_revisions.py
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/api/test_transcription_revisions.py tests/unit/test_transcription_review.py tests/unit/test_transcription_revisions.py
          git commit -m "fix(SAX-043): remove duplicate strict-typing edits"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
