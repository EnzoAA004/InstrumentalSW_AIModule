name: SAX-031 Quality Diagnostics

"on":
  push:
    branches:
      - feature/SAX-031-midi-export
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    name: Python 3.13 isolated quality controls
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Capture pytest and coverage
        id: pytest_coverage
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m pytest --cov=saxo_ai --cov-report=term-missing --cov-report=xml > pytest-coverage.log 2>&1
          code=$?
          printf '%s\n' "$code" > pytest-coverage.exit
          exit "$code"

      - name: Capture Ruff lint
        id: ruff_lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m ruff check src tests scripts > ruff-lint.log 2>&1
          code=$?
          printf '%s\n' "$code" > ruff-lint.exit
          exit "$code"

      - name: Capture Ruff format
        id: ruff_format
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m ruff format --check src tests scripts > ruff-format.log 2>&1
          code=$?
          printf '%s\n' "$code" > ruff-format.exit
          exit "$code"

      - name: Capture mypy
        id: mypy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m mypy > mypy.log 2>&1
          code=$?
          printf '%s\n' "$code" > mypy.exit
          exit "$code"

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sax031-quality-diagnostics
          path: |
            pytest-coverage.log
            pytest-coverage.exit
            ruff-lint.log
            ruff-lint.exit
            ruff-format.log
            ruff-format.exit
            mypy.log
            mypy.exit
          if-no-files-found: error
          retention-days: 1

      - name: Propagate first failing control
        if: always()
        shell: bash
        run: |
          for control in pytest-coverage ruff-lint ruff-format mypy; do
            code=$(cat "${control}.exit")
            if [ "$code" -ne 0 ]; then
              echo "::error::${control} failed with exit code ${code}"
              exit "$code"
            fi
          done
