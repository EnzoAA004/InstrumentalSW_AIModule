name: SAX-045 Ruff Autofix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - name: Apply pinned Ruff fixes and format
        run: |
          python -m ruff check --fix src tests scripts || true
          python -m ruff format src tests scripts
      - name: Commit changes when needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests scripts
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "refactor(SAX-045): apply final pinned Ruff autofix"
          git push
