name: SAX-043 Quality Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Apply final strict narrowing
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/unit/test_transcription_revisions.py")
          text = path.read_text(encoding="utf-8")
          old = "    assert revisions.latest(JOB_ID).revision_number == 0"
          new = (
              "    latest = revisions.latest(JOB_ID)\n"
              "    assert latest is not None\n"
              "    assert latest.revision_number == 0"
          )
          if old in text:
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          python -m ruff format src tests
      - name: Commit exact closure edit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/test_transcription_revisions.py
          if git diff --cached --quiet; then
            echo "No closure edit"
          else
            git commit -m "fix(SAX-043): narrow latest revision before assertion"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
