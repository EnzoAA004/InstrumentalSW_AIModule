name: SAX-045 Post Quality Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Capture complete quality output
        run: |
          set +e
          python scripts/check_quality.py > sax045-post-quality.log 2>&1
          echo "exit_code=$?" >> sax045-post-quality.log
          exit 0
      - uses: actions/upload-artifact@v6
        with:
          name: sax045-post-quality-diagnostics
          path: sax045-post-quality.log
          retention-days: 1
