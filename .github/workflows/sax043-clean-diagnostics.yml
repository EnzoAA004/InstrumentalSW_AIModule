name: SAX-043 Clean Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Correct strict aggregate types
        run: |
          python - <<'PY'
          from pathlib import Path

          repository = Path("src/saxo_ai/infrastructure/repositories.py")
          text = repository.read_text(encoding="utf-8")
          text = text.replace(
              "            existing = merged_reviews.get(job_id)\n"
              "            if existing is not None and existing is not result:\n",
              "            existing_review = merged_reviews.get(job_id)\n"
              "            if existing_review is not None and existing_review is not result:\n",
          )
          text = text.replace(
              "            existing = merged_revisions.get(job_id)\n"
              "            if existing is not None and existing != history:\n",
              "            existing_history = merged_revisions.get(job_id)\n"
              "            if existing_history is not None and existing_history != history:\n",
          )
          repository.write_text(text, encoding="utf-8")

          test = Path("tests/unit/test_transcription_revisions.py")
          text = test.read_text(encoding="utf-8")
          text = text.replace(
              "    InMemoryTranscriptionJobRepository,\n"
              "    InMemoryTranscriptionReviewRegistrationRepository,\n"
              "    InMemoryTranscriptionReviewRepository,\n"
              "    InMemoryTranscriptionRevisionRepository,\n"
              "    WrittenPitchTranscriptionResult,\n"
              "    WrittenPitchTranscriptionResult,\n"
              "]:",
              "    InMemoryTranscriptionJobRepository,\n"
              "    InMemoryTranscriptionReviewRepository,\n"
              "    InMemoryTranscriptionRevisionRepository,\n"
              "    WrittenPitchTranscriptionResult,\n"
              "    WrittenPitchTranscriptionResult,\n"
              "]:",
          )
          test.write_text(text, encoding="utf-8")
          PY
          python -m ruff format src/saxo_ai/infrastructure/repositories.py tests/unit/test_transcription_revisions.py
          python -m ruff check src/saxo_ai/infrastructure/repositories.py tests/unit/test_transcription_revisions.py
      - name: Commit strict typing corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/saxo_ai/infrastructure/repositories.py tests/unit/test_transcription_revisions.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix(SAX-043): satisfy strict aggregate typing"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
