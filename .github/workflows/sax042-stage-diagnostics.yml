name: SAX-042 Stage Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Capture quality output
        run: |
          set +e
          python scripts/check_quality.py > sax042-stage.log 2>&1
          echo "exit_code=$?" >> sax042-stage.log
          exit 0
      - uses: actions/upload-artifact@v6
        with:
          name: sax042-stage-diagnostics
          path: sax042-stage.log
          retention-days: 1
