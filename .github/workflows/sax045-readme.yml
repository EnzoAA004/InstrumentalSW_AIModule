name: SAX-045 README

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.md')
          text = path.read_text()
          marker = '## Revision artifact downloads'
          if marker not in text:
              text += '''

## Revision artifact downloads

SAX-045 exposes read-only list and binary GET transport for already-materialized revision artifacts:

```text
MIDI     audio/midi                                  .mid
MusicXML application/vnd.recordare.musicxml+xml      .musicxml
SVG      image/svg+xml                               .svg
```

Artifacts are linked to a job and immutable revision, validated by safe ID/filename, exact size and lowercase SHA-256, and registered internally in a separate in-memory repository. GET routes never execute MIDI export, rhythm quantization, MusicXML encoding, Verovio rendering, transcription or regeneration. Lists contain descriptors only; downloads return exact bytes with attachment, no-store, nosniff, length, digest and ETag headers.

There is no public registration route, persistence, filesystem, object storage, ZIP or PDF.

MIDI, MusicXML and SVG download transport is implemented for registered artifacts. Artifact generation from a normal uploaded job remains pending. PDF is not implemented.

See `docs/contracts/revision-artifact-download-api-v1.md` and `docs/tdd/iteration-019.md`.
'''
              path.write_text(text)
          PY
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "docs(SAX-045): document artifact download baseline"
          git push
