name: SAX-042 Final Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Capture final quality output
        run: |
          set +e
          python scripts/check_quality.py > sax042-final-quality.log 2>&1
          status=$?
          echo "exit_code=$status" >> sax042-final-quality.log
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v6
        with:
          name: sax042-final-ai-diagnostics
          path: sax042-final-quality.log
          retention-days: 1
