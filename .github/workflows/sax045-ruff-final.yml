name: SAX-045 Final Ruff

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - name: Declare re-export and apply pinned Ruff
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/saxo_ai/infrastructure/repositories.py')
          text = path.read_text()
          text = text.replace(
              '    InMemoryRevisionArtifactRepository,\n)',
              '    InMemoryRevisionArtifactRepository as InMemoryRevisionArtifactRepository,\n)',
          )
          path.write_text(text)
          PY
          python -m ruff format \
            src/saxo_ai/domain/revision_artifacts.py \
            src/saxo_ai/infrastructure/repositories.py \
            tests/integration/test_revision_artifact_exporters.py \
            tests/unit/test_revision_artifact_repository.py
          python -m ruff check --fix \
            src/saxo_ai/domain/revision_artifacts.py \
            src/saxo_ai/infrastructure/repositories.py \
            tests/integration/test_revision_artifact_exporters.py \
            tests/unit/test_revision_artifact_repository.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "refactor(SAX-045): apply pinned Ruff formatting"
          git push
