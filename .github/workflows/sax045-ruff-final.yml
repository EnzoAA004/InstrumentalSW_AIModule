name: SAX-045 Final Ruff

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - name: Declare re-export and apply pinned Ruff format
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/saxo_ai/infrastructure/repositories.py')
          text = path.read_text()
          marker = '''from saxo_ai.infrastructure.revision_artifact_repository import (  # noqa: E402
              InMemoryRevisionArtifactRepository,
          )
          '''
          replacement = marker + '\n__all__ = ["InMemoryRevisionArtifactRepository"]\n'
          if '__all__ = ["InMemoryRevisionArtifactRepository"]' not in text:
              if marker not in text:
                  raise SystemExit('expected repository re-export not found')
              text = text.replace(marker, replacement, 1)
          path.write_text(text)
          PY
          python -m ruff format \
            src/saxo_ai/domain/revision_artifacts.py \
            src/saxo_ai/infrastructure/repositories.py \
            tests/integration/test_revision_artifact_exporters.py \
            tests/unit/test_revision_artifact_repository.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "refactor(SAX-045): apply pinned Ruff formatting"
          git push
