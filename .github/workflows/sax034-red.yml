name: SAX-034 RED

on:
  push:
    branches:
      - feature/SAX-034-musicxml-export

permissions:
  contents: read

jobs:
  red:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run SAX-034 RED
        run: |
          set +e
          python -m pytest \
            tests/unit/test_musicxml_contracts.py \
            tests/unit/test_musicxml_pitch.py \
            tests/unit/test_musicxml_measures.py \
            tests/unit/test_musicxml_export.py
          status=$?
          echo "RED_EXIT_CODE=${status}"
          test "${status}" -ne 0
