name: SAX-032 Command Metrics

"on":
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  metrics:
    runs-on: ubuntu-24.04
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Collect command metrics
        run: python scripts/sax032_command_metrics.py
      - name: Upload command metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sax032-command-metrics
          path: sax032-command-metrics
          retention-days: 1
