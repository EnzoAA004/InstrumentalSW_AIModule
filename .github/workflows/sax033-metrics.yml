name: SAX-033 Metrics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: sax033-metrics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-24.04
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run requested commands
        shell: bash
        run: |
          set -o pipefail
          : > sax033-metrics.txt
          run_command() {
            echo "" | tee -a sax033-metrics.txt
            echo "\$ $*" | tee -a sax033-metrics.txt
            "$@" 2>&1 | tee -a sax033-metrics.txt
            status=${PIPESTATUS[0]}
            echo "EXIT_CODE=${status}" | tee -a sax033-metrics.txt
            return ${status}
          }
          run_command python scripts/check_quality.py
          run_command python -m pytest
          run_command python -m pytest -m "not integration"
          run_command python -m pytest -m integration
          run_command python -m pytest -m midi_integration
          run_command python -m pytest -m baseline_integration
          run_command python -m pytest --cov=saxo_ai --cov-report=term-missing --cov-report=xml
          run_command python -m ruff check src tests scripts
          run_command python -m ruff format --check src tests scripts
          run_command python -m mypy

      - name: Upload command metrics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sax033-command-metrics
          path: sax033-metrics.txt
          if-no-files-found: error
          retention-days: 1
