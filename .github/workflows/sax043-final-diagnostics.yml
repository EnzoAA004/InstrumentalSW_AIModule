name: SAX-043 Final Diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Correct repeated registration fixture
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/unit/test_transcription_revisions.py")
          text = path.read_text(encoding="utf-8")
          old = "RegisterTranscriptionReview(jobs, registrations, fixed_clock).execute(JOB_ID, result)"
          first = text.find(old)
          second = text.find(old, first + len(old))
          if first < 0 or second < 0 or text.find(old, second + len(old)) >= 0:
              raise RuntimeError("expected exactly two registration calls")
          new = (
              "RegisterTranscriptionReview(\n"
              "        jobs,\n"
              "        InMemoryTranscriptionReviewRegistrationRepository(reviews, revisions),\n"
              "        fixed_clock,\n"
              "    ).execute(JOB_ID, result)"
          )
          path.write_text(text[:second] + new + text[second + len(old):], encoding="utf-8")
          PY
          python -m ruff format tests/unit/test_transcription_revisions.py
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/test_transcription_revisions.py
          git commit -m "test(SAX-043): reuse atomic registration view explicitly"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
