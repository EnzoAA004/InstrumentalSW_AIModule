name: Quality

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install project with pinned baseline
        if: matrix.python-version == '3.11'
        run: python -m pip install -e ".[dev,baseline]"
      - name: Install project
        if: matrix.python-version != '3.11'
        run: python -m pip install -e ".[dev]"
      - name: Run quality gate with real baseline
        if: matrix.python-version == '3.11'
        env:
          SAXO_REQUIRE_BASELINE: "1"
        run: |
          set -o pipefail
          python scripts/check_quality.py 2>&1 | tee quality.log
      - name: Run quality gate
        if: matrix.python-version != '3.11'
        run: |
          set -o pipefail
          python scripts/check_quality.py 2>&1 | tee quality.log
      - name: Materialize exact Ruff formatting
        if: always() && matrix.python-version == '3.12'
        run: |
          python -m ruff format \
            src/saxo_ai/application/transcription_errors.py \
            src/saxo_ai/infrastructure/hf_output.py \
            src/saxo_ai/infrastructure/hf_saxophone.py \
            tests/integration/test_hf_saxophone_baseline.py \
            tests/unit/test_hf_saxophone_runtime.py
      - name: Upload exact Ruff formatting
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: saxo-ruff-formatted
          path: |
            src/saxo_ai/application/transcription_errors.py
            src/saxo_ai/infrastructure/hf_output.py
            src/saxo_ai/infrastructure/hf_saxophone.py
            tests/integration/test_hf_saxophone_baseline.py
            tests/unit/test_hf_saxophone_runtime.py
          retention-days: 1
      - name: Upload one-run quality diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saxo-quality-${{ matrix.python-version }}
          path: quality.log
          if-no-files-found: ignore
          retention-days: 1
