name: Quality

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run quality gate
        shell: bash
        run: |
          set -o pipefail
          python scripts/check_quality.py 2>&1 | tee quality.log

      - name: Upload failing quality log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-log-python-${{ matrix.python-version }}
          path: quality.log
          retention-days: 1
