name: Quality

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SAXO_REQUIRE_FFMPEG: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install project with pinned baseline
        id: baseline_install
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: python -m pip install -e ".[dev,baseline]" > baseline-install.log 2>&1
      - name: Install project
        if: matrix.python-version != '3.11'
        run: python -m pip install -e ".[dev]"
      - name: Run quality gate with real baseline
        id: baseline_quality
        if: always() && matrix.python-version == '3.11'
        continue-on-error: true
        env:
          SAXO_REQUIRE_BASELINE: "1"
        run: python scripts/check_quality.py > quality.log 2>&1
      - name: Run quality gate
        id: core_quality
        if: matrix.python-version != '3.11'
        continue-on-error: true
        run: python scripts/check_quality.py > quality.log 2>&1
      - name: Upload isolated diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saxo-diagnostics-${{ matrix.python-version }}
          path: |
            baseline-install.log
            quality.log
          if-no-files-found: ignore
          retention-days: 1
      - name: Propagate diagnostic failure
        if: >-
          steps.baseline_install.outcome == 'failure' ||
          steps.baseline_quality.outcome == 'failure' ||
          steps.core_quality.outcome == 'failure'
        run: exit 1
