name: SAX-043 Documentation Finalize

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  document:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Document atomic review registration
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"{path}: expected one match for {old!r}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace(
              "README.md",
              "SAX-043 initializes immutable revision zero when `RegisterTranscriptionReview` first stores the real SAX-042 result:",
              "SAX-043 initializes the real SAX-042 review and immutable revision zero through one atomic registration boundary:",
          )
          replace(
              "README.md",
              "The source object and every historical revision remain unchanged. A complete new revision is appended for each explicit operation batch.",
              "`TranscriptionReviewRegistrationRepository.initialize(...)` validates the aggregate before swapping one in-memory snapshot containing both the source review and revision history. A preexisting identical review with no history is completed with exactly one revision zero. Re-registering the same object is idempotent; a different review instance is rejected. Readers sharing the store cannot observe only one half of the initialization, and job status is unchanged.\n\nThe source object and every historical revision remain unchanged. A complete new revision is appended for each explicit operation batch.",
          )
          replace(
              "docs/contracts/transcription-revisions-api-v1.md",
              "`RegisterTranscriptionReview` atomically initializes revision zero when the review is first registered. Re-registering the same exact result does not create a second revision zero.",
              "`RegisterTranscriptionReview` builds revision zero and delegates one logical write to `TranscriptionReviewRegistrationRepository.initialize(...)`. The in-memory implementation validates the complete aggregate before replacing one shared snapshot containing both the review and its revision history. Therefore readers cannot observe a review without revision zero or revision zero without its review.\n\nA preexisting identical review with an empty history is completed by creating exactly one revision zero. Re-registering the same result instance is idempotent and returns that exact object. A different review instance for the same job is rejected with a controlled mismatch error. Validation or simulated repository failure leaves both stores unchanged, and registration never changes `JobStatus`.",
          )
          replace(
              "docs/tdd/iteration-018.md",
              "test(SAX-043): define revision history conflicts and HTTP API",
              "test(SAX-043): define revision history conflicts and HTTP API\n"
              "test(SAX-043): require revision zero for a preexisting review\n"
              "test(SAX-043): require atomic review and revision initialization",
          )
          replace(
              "docs/tdd/iteration-018.md",
              "- `RegisterTranscriptionReview` initializes revision zero once;\n- revision zero is derived without mutating `WrittenPitchTranscriptionResult`;\n- separate in-memory repositories own revision history and regeneration requests;",
              "- `RegisterTranscriptionReview` builds revision zero and performs one call to the atomic registration port;\n"
              "- one shared in-memory snapshot owns review plus revision history while query ports remain separate;\n"
              "- a preexisting identical review with no history receives exactly one revision zero;\n"
              "- repeated registration of the same instance is idempotent and a different instance is rejected;\n"
              "- simulated initialization failure leaves no partial review or revision-zero state;\n"
              "- revision zero is derived without mutating `WrittenPitchTranscriptionResult` or job status;\n"
              "- a separate repository owns regeneration requests;",
          )
          replace(
              "docs/tdd/iteration-018.md",
              "RegisterTranscriptionReview\n→ TranscriptionRevisionRepository.initialize(revision zero)",
              "RegisterTranscriptionReview\n"
              "→ build complete revision zero\n"
              "→ TranscriptionReviewRegistrationRepository.initialize(review, revision zero)\n"
              "→ one validated shared-snapshot replacement",
          )
          PY
      - name: Commit documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/contracts/transcription-revisions-api-v1.md docs/tdd/iteration-018.md
          git commit -m "docs(SAX-043): document atomic review registration"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
