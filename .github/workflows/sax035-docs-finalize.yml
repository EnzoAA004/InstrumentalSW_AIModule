name: SAX-035 Docs Finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Record final command results
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/tdd/iteration-016.md")
          text = path.read_text()
          old = """## Resultados finales

Los resultados completos de comandos, coverage y matriz protegida se registran en el cuerpo definitivo del PR después de validar el head limpio documentado.
"""
          new = """## Resultados completos solicitados

El checkout local completo continuó bloqueado por DNS de salida. Los resultados se obtuvieron en GitHub Actions autenticado, sin atribuirlos al entorno local.

Un runner temporal descargable utilizó Python 3.13.14 y un binario FFmpeg aislado únicamente para evitar bloqueos de `apt` en el recolector. La matriz protegida conserva su instalación normal de FFmpeg y el baseline real de Python 3.11.

```text
SAX-035 Metrics #1
run:      29853663759
artifact: sax035-command-metrics
ID:       8504397814
head:     4b3e99e7f018364e31f4484169d2badf8a926a27
```

```text
python scripts/check_quality.py
922 passed, 1 skipped
3060 statements, 199 missed
954 branches, 134 partial branches
91.45% coverage
Ruff lint passed
111 files already formatted
mypy: no issues in 111 source files
exit 0
```

```text
python -m pytest
922 passed, 1 skipped

python -m pytest -m "not integration"
899 passed, 24 deselected

python -m pytest -m integration
23 passed, 1 skipped, 899 deselected

python -m pytest -m midi_integration
9 passed, 914 deselected

python -m pytest -m musicxml_integration
1 passed, 922 deselected

python -m pytest -m score_render_integration
3 passed, 920 deselected

python -m pytest -m baseline_integration
1 skipped, 922 deselected

python -m pytest --cov=saxo_ai --cov-report=term-missing --cov-report=xml
922 passed, 1 skipped
91.45% coverage

python -m ruff check src tests scripts
passed

python -m ruff format --check src tests scripts
111 files already formatted

python -m mypy
no issues in 111 source files
```

Todos los comandos terminaron con exit code cero. El único skip en Python 3.13 corresponde a la inferencia real fijada intencionalmente a Python 3.11. `score_render_integration` ejecutó tres casos reales sin skip propio.

El workflow temporal de métricas fue eliminado inmediatamente después de descargar el artefacto. La matriz protegida definitiva y su head limpio se registran en el cuerpo final del PR, evitando modificar código después de esa validación.
"""
          if old not in text:
              raise SystemExit("results placeholder not found")
          path.write_text(text.replace(old, new))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/tdd/iteration-016.md
          git commit -m "docs(SAX-035): record complete quality evidence"
          git push origin HEAD:${{ github.head_ref }}
